<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>PacFrans</title>
	<meta name="description" content="Speel PacFrans, een Pacman-stijl game met hoofd.png" />
	<link rel="stylesheet" href="style.css" />
	<link rel="stylesheet" href="pacfrans.css" />
</head>
<body class="pac-page">
	<main class="pac-main">
		<section class="pac-topbar">
			<div>
				<h1>PacFrans</h1>
				<p>Verzamel alle dots, ontwijk spoken en pak de hoogste score.</p>
			</div>
			<div class="pac-top-actions">
				<a class="back-home" href="/">Terug naar home</a>
			</div>
		</section>

		<section class="pac-card">
			<div class="pac-hud">
				<p class="hud-item">Score: <strong id="score">0</strong></p>
				<p class="hud-item">Status: <strong id="status">Spelen</strong></p>
				<button id="fullscreenBtn" class="reset" type="button">Fullscreen</button>
				<button id="restartBtn" class="reset" type="button">Herstart</button>
			</div>

			<div class="pac-canvas-wrap">
				<canvas id="gameCanvas" width="672" height="544" aria-label="PacFrans speelveld" tabindex="0"></canvas>
				<div id="finalBoard" class="final-board" aria-live="polite">
					<div id="finalConfetti" class="final-confetti" aria-hidden="true"></div>
					<p class="final-label">Eindscore</p>
					<p class="final-score"><span id="finalScore">0</span> punten</p>
					<p class="final-message">Volgende keer beter.</p>
					<p class="final-submessage">Frans is meer dan alleen een taal.</p>
					<button id="restartFinalBtn" class="reset" type="button">Nog een keer</button>
				</div>
			</div>

			<p class="pac-help">Besturing: pijltjestoetsen op desktop, swipen op het speelveld op telefoon.</p>
		</section>
	</main>

	<script src="pacfrans.js"></script>
</body>
</html>
