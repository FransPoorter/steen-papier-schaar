<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recensiebeheer — franstastisch.nl</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin">

  <header class="admin-header">
    <div class="admin-header-inner">
      <div>
        <h1>Recensiebeheer</h1>
        <p id="adminUser" class="admin-user"></p>
      </div>
      <div class="admin-header-actions">
        <a href="/" class="admin-btn admin-btn--secondary">← Terug naar site</a>
        <button id="logoutBtn" class="admin-btn admin-btn--secondary">Uitloggen</button>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div class="admin-tabs">
      <button class="admin-tab admin-tab--active" data-tab="pending">
        Te beoordelen <span id="pendingCount" class="admin-badge">…</span>
      </button>
      <button class="admin-tab" data-tab="approved">
        Goedgekeurd <span id="approvedCount" class="admin-badge">…</span>
      </button>
    </div>

    <div id="reviewsContainer" class="admin-reviews" aria-live="polite">
      <p class="admin-loading">Laden…</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin-beheer.js"></script>
</body>
</html>
